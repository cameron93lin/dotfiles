# --- Global options ---
set-option -g set-titles on
set-option -g set-titles-string "#{window_name}"
set-option -g allow-passthrough on
set-option -g history-limit 50000
set-option -g mouse on

# --- Performance ---
set -s escape-time 10
set -g display-time 4000
set -g focus-events on
setw -g aggressive-resize on

# --- Terminal colors ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g set-clipboard on

# --- Window options ---
set-option -w allow-rename off
set-option -w automatic-rename off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Key bindings ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"
set -g xterm-keys on
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D
bind -n M-[ previous-window
bind -n M-] next-window

# --- Pane resize ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
set-option -sg repeat-time 300

# --- Vi copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Scroll: one line at a time ---
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind -T copy-mode WheelUpPane send-keys -X scroll-up
bind -T copy-mode WheelDownPane send-keys -X scroll-down

# --- Activity monitoring ---
set-option -gw monitor-activity on
set-option -g visual-activity off

# --- Catppuccin Mocha status bars (top + bottom) ---

# Top bar: session + sapling info
set -g status-position top
set -g status-justify left
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-interval 5

set -g status-left '#{?client_prefix,#[bg=#f38ba8],#[bg=#89b4fa]}#[fg=#1e1e2e,bold] #S #{?client_prefix,#[bg=#1e1e2e]#[fg=#f38ba8],#[bg=#1e1e2e]#[fg=#89b4fa]}'
set -g status-left-length 100

set -g status-right '#[fg=#f9e2af]#[bg=#f9e2af,fg=#1e1e2e,bold] ⏰ #(~/.config/bin/od-ttl.sh) #[bg=#f9e2af,fg=#f38ba8]#[bg=#f38ba8,fg=#1e1e2e,bold] %H:%M #[bg=#f38ba8,fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e,bold] %a %d %b '
set -g status-right-length 60

setw -g window-status-current-style 'fg=#1e1e2e bg=#cba6f7 bold'
setw -g window-status-current-format ' #I#[fg=#1e1e2e]:#[fg=#1e1e2e]#W#{?window_zoomed_flag,Z,}#{?window_bell_flag,!,}#{?window_activity_flag,*,} '
setw -g window-status-last-style 'fg=#fab387 bg=#313244'
setw -g window-status-style 'fg=#cdd6f4 bg=#313244'
setw -g window-status-format ' #I#[fg=#89b4fa]:#[fg=#cdd6f4]#W#{?window_zoomed_flag,Z,}#{?window_bell_flag,!,}#{?window_activity_flag,*,} '
setw -g window-status-activity-style 'fg=#f38ba8,bg=#313244'

# Bottom bar: window list + pane info
set -g status 2
set -g status-format[1] '#[align=left,bg=#313244,fg=#585b70] 󰜘 #(~/.config/bin/sl-base.sh) #[fg=#fab387]#(~/.config/bin/sl-prompt.sh) #[align=right,bg=#313244,fg=#585b70] #{pane_current_path} #[fg=#a6e3a1]󰍛 #(~/.config/bin/mem-usage.sh) '

set -g pane-border-style 'fg=#585b70'
set -g pane-active-border-style 'fg=#89b4fa,bold'

set -g message-style 'bg=#cba6f7 fg=#1e1e2e bold'
set -g message-command-style 'bg=#f38ba8 fg=#1e1e2e bold'
