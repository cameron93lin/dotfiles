# Starship config - Catppuccin Mocha colors, p10k layout
# 3-line prompt with ╭─├─╰─ connectors

format = """
[╭─](color_overlay)$time$fill$memory_usage$battery
[├─](color_overlay)$username$hostname$fill$aws
[╰─](color_overlay)$os$directory$git_branch$git_status$character"""

right_format = """$cmd_duration$status"""

add_newline = true

# Catppuccin Mocha palette
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
color_overlay = "#6c7086"

# ─────────────────────────────────────────
# Line 1: time (left) + system (right)
# ─────────────────────────────────────────

[time]
disabled = false
format = "[ $time](blue) "
time_format = "%H:%M:%S"

# ─────────────────────────────────────────
# Line 2: user@host (left)
# ─────────────────────────────────────────

[username]
show_always = true
format = "[$user](teal)"
style_user = "teal"
style_root = "red"

[hostname]
ssh_only = false
format = "[@$hostname](teal) "

[aws]
disabled = false
format = "[$symbol($profile )(\\($region\\))](peach) "
symbol = " "

# ─────────────────────────────────────────
# Line 3: os + dir + git + prompt
# ─────────────────────────────────────────

[os]
disabled = false
format = "[$symbol](lavender)"

[os.symbols]
Macos = " "
Linux = " "

[directory]
format = "[$path$read_only](mauve) "
read_only = " 󰌾"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
format = "[$symbol$branch(:$remote_branch)](green) "
symbol = " "

[git_status]
format = '([$all_status$ahead_behind](yellow) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇢${count}"
diverged = "⇕⇡${ahead_count}⇢${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

# ─────────────────────────────────────────
# Right prompt
# ─────────────────────────────────────────

[cmd_duration]
min_time = 2000
format = "[ $duration](yellow) "

[status]
disabled = false
format = "[$symbol$status](red) "
symbol = "✘ "

# ─────────────────────────────────────────
# System info (line 1 right)
# ─────────────────────────────────────────

[memory_usage]
disabled = false
threshold = 0
format = "[󰍛 ${ram_pct}](sapphire) "

[battery]
disabled = false
format = "[$symbol$percentage](green) "

[[battery.display]]
threshold = 30
style = "red"

[[battery.display]]
threshold = 60
style = "yellow"

[[battery.display]]
threshold = 100
style = "green"

[fill]
symbol = " "

# ─────────────────────────────────────────
# Disabled
# ─────────────────────────────────────────

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[java]
disabled = true

[package]
disabled = true
